<style>
  :root {
    --cream: #faf7f4;
    --warm-white: #fff9f5;
    --gold: #c9a96e;
    --gold-light: #e8d5b0;
    --gold-dark: #a07840;
    --charcoal: #2a2320;
    --mid: #6b5c52;
    --light-mid: #b8a99e;
    --border: #e8ddd6;
    --error: #c0392b;
    --success: #5a8a6a;
    --shadow: 0 4px 32px rgba(42,35,32,0.10);
    --shadow-sm: 0 2px 12px rgba(42,35,32,0.07);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    min-height: 100vh;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── HEADER ─── */
  .app-header {
    background: var(--charcoal);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-header .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--gold-light);
    letter-spacing: 0.05em;
  }
  .app-header .logo img {
    width: 40px; height: 40px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid var(--gold-dark);
  }
  .app-header .logo span { font-style: italic; color: var(--gold); }
  .step-indicator {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .step-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--mid);
    transition: all 0.3s ease;
  }
  .step-dot.active { background: var(--gold); transform: scale(1.3); }
  .step-dot.done { background: var(--gold-dark); }

  /* ─── MAIN LAYOUT ─── */
  .app-body {
    max-width: 800px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* ─── STEP TITLE ─── */
  .step-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 300;
    color: var(--charcoal);
    margin-bottom: 4px;
    line-height: 1.2;
  }
  .step-subtitle {
    font-size: 14px;
    font-weight: 400;
    color: var(--mid);
    margin-bottom: 32px;
    letter-spacing: 0.03em;
  }

  /* ─── CARDS ─── */
  .card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-sm);
  }
  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--gold-dark);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-size: 13px;
  }

  /* ─── FORM ELEMENTS ─── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-grid.cols-1 { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label {
    font-size: 11px;
    font-weight: 600;
    color: var(--mid);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  input[type="text"],
  input[type="date"],
  input[type="email"],
  input[type="tel"],
  input[type="number"],
  textarea,
  select {
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    color: var(--charcoal);
    transition: border-color 0.2s;
    width: 100%;
    -webkit-appearance: none;
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--gold);
    background: #fff;
  }
  textarea { resize: vertical; min-height: 80px; }

  /* ─── YES/NO QUESTIONS ─── */
  .yesno-grid {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .yesno-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 14px;
    border-radius: var(--radius-sm);
    transition: background 0.15s;
    gap: 12px;
  }
  .yesno-row:nth-child(even) { background: rgba(201,169,110,0.05); }
  .yesno-row:hover { background: rgba(201,169,110,0.10); }
  .yesno-question {
    font-size: 14px;
    color: var(--charcoal);
    flex: 1;
    line-height: 1.4;
  }
  .yesno-buttons {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .yn-btn {
    padding: 6px 18px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--mid);
    transition: all 0.18s;
    min-width: 46px;
  }
  .yn-btn.yes.active {
    background: var(--success);
    border-color: var(--success);
    color: white;
  }
  .yn-btn.no.active {
    background: var(--charcoal);
    border-color: var(--charcoal);
    color: white;
  }
  .yn-btn:hover { border-color: var(--gold); color: var(--gold-dark); }

  /* ─── TREATMENT SELECTOR ─── */
  .treatment-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .treatment-card {
    background: var(--warm-white);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 20px;
    cursor: pointer;
    text-align: center;
    transition: all 0.22s ease;
    position: relative;
    overflow: hidden;
  }
  .treatment-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    transform: scaleX(0);
    transition: transform 0.22s ease;
  }
  .treatment-card:hover { border-color: var(--gold-light); box-shadow: var(--shadow); }
  .treatment-card:hover::before { transform: scaleX(1); }
  .treatment-card.selected {
    border-color: var(--gold);
    background: #fffbf5;
    box-shadow: 0 4px 20px rgba(201,169,110,0.20);
  }
  .treatment-card.selected::before { transform: scaleX(1); }
  .treatment-icon { font-size: 36px; margin-bottom: 12px; display: block; }
  .treatment-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--charcoal);
    margin-bottom: 6px;
  }
  .treatment-desc {
    font-size: 12px;
    color: var(--light-mid);
    line-height: 1.5;
  }
  .treatment-card.selected .treatment-name { color: var(--gold-dark); }

  /* ─── CONSENT TEXT ─── */
  .consent-box {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 20px 22px;
    max-height: 320px;
    overflow-y: auto;
    font-size: 13px;
    line-height: 1.75;
    color: var(--mid);
    margin-bottom: 20px;
  }
  .consent-box h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--charcoal);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .consent-box h4 {
    font-size: 12px;
    font-weight: 600;
    color: var(--gold-dark);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 14px 0 6px;
  }
  .consent-box ul { padding-left: 18px; }
  .consent-box ul li { margin-bottom: 4px; }

  /* ─── SIGNATURE ─── */
  .signature-wrapper {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    position: relative;
    overflow: hidden;
    background: white;
    cursor: crosshair;
  }
  .signature-wrapper canvas { display: block; touch-action: none; }
  .signature-label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-style: italic;
    color: var(--light-mid);
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .sig-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 10px;
  }
  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 18px;
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-clear:hover { border-color: var(--error); color: var(--error); }

  /* ─── FOLLOW-UP TABLE (LASER) ─── */
  .followup-table-wrapper { overflow-x: auto; }
  .followup-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .followup-table th {
    background: var(--charcoal);
    color: var(--gold-light);
    padding: 10px 12px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .followup-table td { padding: 4px 6px; border-bottom: 1px solid var(--border); }
  .followup-table input {
    border: none;
    background: transparent;
    font-size: 13px;
    padding: 6px 4px;
    width: 100%;
    color: var(--charcoal);
  }
  .followup-table input:focus { outline: none; background: rgba(201,169,110,0.08); border-radius: 4px; }
  .followup-table tr:nth-child(even) td { background: rgba(201,169,110,0.04); }
  .btn-add-row {
    margin-top: 10px;
    background: none;
    border: 1px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 18px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    color: var(--mid);
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
  }
  .btn-add-row:hover { border-color: var(--gold); color: var(--gold-dark); }

  /* ─── NAVIGATION BUTTONS ─── */
  .nav-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .btn-primary {
    background: var(--charcoal);
    color: var(--gold-light);
    border: none;
    border-radius: 30px;
    padding: 14px 38px;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.22s;
  }
  .btn-primary:hover { background: var(--gold-dark); color: white; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(160,120,64,0.3); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: transparent;
    color: var(--mid);
    border: 1.5px solid var(--border);
    border-radius: 30px;
    padding: 13px 28px;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--gold); color: var(--gold-dark); }
  .btn-submit {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: white;
    border: none;
    border-radius: 30px;
    padding: 16px 48px;
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 4px 20px rgba(160,120,64,0.3);
  }
  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(160,120,64,0.4); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ─── GDPR CHECKBOX ─── */
  .gdpr-box {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 20px;
    background: rgba(201,169,110,0.06);
    border: 1px solid var(--gold-light);
    border-radius: var(--radius-sm);
    margin-top: 16px;
  }
  .gdpr-box input[type="checkbox"] {
    width: 20px; height: 20px;
    min-width: 20px;
    cursor: pointer;
    accent-color: var(--gold-dark);
    margin-top: 2px;
  }
  .gdpr-box label {
    font-size: 13px;
    color: var(--mid);
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
    line-height: 1.6;
  }

  /* ─── SUCCESS SCREEN ─── */
  .success-screen {
    text-align: center;
    padding: 60px 20px;
  }
  .success-icon { font-size: 64px; margin-bottom: 24px; display: block; }
  .success-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    color: var(--charcoal);
    margin-bottom: 12px;
  }
  .success-subtitle { font-size: 15px; color: var(--mid); line-height: 1.6; }

  /* ─── LOADING OVERLAY ─── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(42,35,32,0.65);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    display: none;
  }
  .overlay.active { display: flex; }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid rgba(201,169,110,0.3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .overlay-text { color: var(--gold-light); font-size: 15px; letter-spacing: 0.06em; }

  /* ─── VALIDATION ─── */
  .error-msg {
    font-size: 11px;
    color: var(--error);
    margin-top: 4px;
    display: none;
  }
  .form-group.has-error input,
  .form-group.has-error select { border-color: var(--error); }
  .form-group.has-error .error-msg { display: block; }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--charcoal);
    color: var(--gold-light);
    padding: 14px 28px;
    border-radius: 30px;
    font-size: 14px;
    z-index: 2000;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--error); color: white; }

  /* ─── SECTION DIVIDER ─── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {

function render() {
  updateDots();
  const body = document.getElementById('appBody');
  body.innerHTML = '';
  if (state.step === 1) renderStep1(body);
  else if (state.step === 2) renderStep2(body);
  else if (state.step === 3) renderStep3(body);
  else if (state.step === 4) renderStep4(body);
  else if (state.step === 5) renderSuccess(body);
  window.scrollTo(0, 0);
}

function updateDots() {
  const dots = document.getElementById('stepDots');
  dots.innerHTML = '';
  for (let i = 1; i <= state.totalSteps; i++) {
    const d = document.createElement('div');
    d.className = 'step-dot' + (i === state.step ? ' active' : i < state.step ? ' done' : '');
    dots.appendChild(d);
  }
}

function renderStep1(body) {
  body.innerHTML = `

    <div class="nav-bar">
      <div></div>
      <button class="btn-primary" id="btnNext1" disabled>Continuar →</button>
    </div>
  `;
  const grid = document.getElementById('treatmentGrid');
  TREATMENTS.forEach(t => {
    const card = document.createElement('div');
    card.className = 'treatment-card' + (state.treatment?.id === t.id ? ' selected' : '');
    card.innerHTML = `
      <span class="treatment-icon">${t.icon}</span>
      <div class="treatment-name">${t.name}</div>
      <div class="treatment-desc">${t.desc}</div>
    `;
    card.addEventListener('click', () => {
      state.treatment = t;
      document.querySelectorAll('.treatment-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      document.getElementById('btnNext1').disabled = false;
    });
    grid.appendChild(card);
  });
  document.getElementById('btnNext1').addEventListener('click', () => {
    state.step = 2;
    render();
  });
}

    grid.appendChild(row);
  });

  grid.querySelectorAll('.yn-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = +btn.dataset.i;
      const v = btn.dataset.v === 'true';
      state.medical[i] = v;
      const row = btn.closest('.yesno-row');
      row.querySelectorAll('.yn-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  document.getElementById('btnBack2').addEventListener('click', () => { state.step = 1; render(); });
  document.getElementById('btnNext2').addEventListener('click', () => {
    if (!validateStep2()) return;
    savePersonalData();
    state.step = 3;
    render();
  });
}

function validateStep2() {
  const required = ['nombre','apellidos','nacimiento','documento','telefono'];
  let ok = true;
  required.forEach(f => {
    const fg = document.getElementById('fg_'+f);
    const val = document.getElementById('f_'+f).value.trim();
    if (!val) { fg.classList.add('has-error'); ok = false; }
    else { fg.classList.remove('has-error'); }
  });
  if (!ok) { showToast('Completá los campos obligatorios', true); }
  return ok;
}

function savePersonalData() {
  ['nombre','apellidos','nacimiento','documento','telefono','email','direccion','localidad','cp','tipopiel','fecha','observaciones'].forEach(f => {
    const el = document.getElementById('f_'+f);
    if (el) state.personal[f] = el.value;
  });
}

  // already saved via input events

// ═══════════════════════════════════════════════════════════════
//  STEP 4 — FIRMA + GDPR + ENVIAR
// ═══════════════════════════════════════════════════════════════
let signatureCanvas, signatureCtx, isDrawing = false, hasSigned = false;

function renderStep4(body) {
  body.innerHTML = `
    <h1 class="step-title">Firma y envío</h1>
    <p class="step-subtitle">Firma con el dedo en el recuadro para completar el proceso</p>

    <div class="card">
      <div class="card-title">Firma del Paciente</div>
      <div class="signature-wrapper" id="sigWrapper">
        <canvas id="sigCanvas" width="740" height="200"></canvas>
        <span class="signature-label" id="sigLabel">Firmá aquí con el dedo →</span>
      </div>
      <div class="sig-actions">
        <button class="btn-clear" id="btnClearSig">Limpiar firma</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Protección de datos</div>
      <div class="gdpr-box">
        <input type="checkbox" id="gdprCheck" ${state.gdpr?'checked':''}>
        <label for="gdprCheck">
          He leído y acepto el tratamiento de mis datos personales conforme al Reglamento General de Protección de Datos (RGPD). Mis datos serán utilizados exclusivamente para la gestión de mi historia clínica por parte de Soho Beauty Clinic. Puedo ejercer mis derechos de acceso, rectificación y supresión en cualquier momento.
        </label>
      </div>
    </div>

    <div class="card" style="background:rgba(201,169,110,0.05);border-color:var(--gold-light);">
      <div class="card-title">Resumen de la sesión</div>
      <div style="font-size:14px;color:var(--mid);line-height:2;">
        <strong style="color:var(--charcoal)">Paciente:</strong> ${state.personal.nombre} ${state.personal.apellidos}<br>
        <strong style="color:var(--charcoal)">Tratamiento:</strong> ${state.treatment.name}<br>
        <strong style="color:var(--charcoal)">Fecha:</strong> ${state.personal.fecha || new Date().toLocaleDateString('es-ES')}<br>
        <strong style="color:var(--charcoal)">Documento:</strong> ${state.personal.documento}
      </div>
    </div>

    <div class="nav-bar">
      <button class="btn-secondary" id="btnBack4">← Volver</button>
      <button class="btn-submit" id="btnSubmit">Generar PDF y guardar →</button>
    </div>
  `;

  // Resize canvas to wrapper
  const wrapper = document.getElementById('sigWrapper');
  const canvas = document.getElementById('sigCanvas');
  canvas.width = wrapper.offsetWidth || 700;
  canvas.height = 200;
  signatureCanvas = canvas;
  signatureCtx = canvas.getContext('2d');
  signatureCtx.strokeStyle = '#2a2320';
  signatureCtx.lineWidth = 2.5;
  signatureCtx.lineCap = 'round';
  signatureCtx.lineJoin = 'round';

  if (state.signature) {
    const img = new Image();
    img.onload = () => signatureCtx.drawImage(img, 0, 0);
    img.src = state.signature;
    document.getElementById('sigLabel').style.opacity = '0';
    hasSigned = true;
  }

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - rect.left) * scaleX, y: (src.clientY - rect.top) * scaleY };
  }

  canvas.addEventListener('mousedown', e => { isDrawing = true; const p = getPos(e); signatureCtx.beginPath(); signatureCtx.moveTo(p.x, p.y); });
  canvas.addEventListener('mousemove', e => { if (!isDrawing) return; const p = getPos(e); signatureCtx.lineTo(p.x, p.y); signatureCtx.stroke(); hasSigned = true; document.getElementById('sigLabel').style.opacity='0'; });
  canvas.addEventListener('mouseup', () => { isDrawing = false; });

  canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; const p = getPos(e); signatureCtx.beginPath(); signatureCtx.moveTo(p.x, p.y); }, {passive:false});
  canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!isDrawing) return; const p = getPos(e); signatureCtx.lineTo(p.x, p.y); signatureCtx.stroke(); hasSigned = true; document.getElementById('sigLabel').style.opacity='0'; }, {passive:false});
  canvas.addEventListener('touchend', () => { isDrawing = false; });

  document.getElementById('btnClearSig').addEventListener('click', () => {
    signatureCtx.clearRect(0, 0, canvas.width, canvas.height);
    hasSigned = false;
    state.signature = null;
    document.getElementById('sigLabel').style.opacity = '1';
  });

  document.getElementById('gdprCheck').addEventListener('change', e => { state.gdpr = e.target.checked; });
  document.getElementById('btnBack4').addEventListener('click', () => { state.step = 3; render(); });
  document.getElementById('btnSubmit').addEventListener('click', handleSubmit);
}

// ═══════════════════════════════════════════════════════════════
//  SUBMIT
// ═══════════════════════════════════════════════════════════════
async function handleSubmit() {
  if (!hasSigned) { showToast('Necesitás firmar antes de enviar', true); return; }
  if (!state.gdpr) { showToast('Aceptá la política de protección de datos', true); return; }

  state.signature = signatureCanvas.toDataURL('image/png');

  document.getElementById('overlay').classList.add('active');

  try {
    const pdfBase64 = await generatePDF();
    await sendToGoogleDrive(pdfBase64);
    document.getElementById('overlay').classList.remove('active');
    state.step = 5;
    render();
  } catch (err) {
    document.getElementById('overlay').classList.remove('active');
    console.error(err);
    showToast('Error al enviar. Revisá la conexión.', true);
  }
}

// ═══════════════════════════════════════════════════════════════
//  PDF GENERATION
// ═══════════════════════════════════════════════════════════════
async function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 210, margin = 18, lineH = 7;
  let y = 20;
  const p = state.personal;
  const t = state.treatment;

  const addText = (text, x, size=11, bold=false, color=[42,35,32]) => {
    doc.setFontSize(size);
    doc.setFont('helvetica', bold ? 'bold' : 'normal');
    doc.setTextColor(...color);
    doc.text(text, x, y);
  };
  const newLine = (n=1) => { y += lineH * n; };
  const checkPage = (need=20) => { if (y + need > 270) { doc.addPage(); y = 20; } };
  const hLine = (col=[200,185,165]) => { doc.setDrawColor(...col); doc.line(margin, y, W-margin, y); newLine(0.5); };

  // ── Header ──
  doc.setFillColor(42, 35, 32);
  doc.rect(0, 0, W, 30, 'F');
  doc.setFontSize(22);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(232, 213, 176);
  doc.text('Soho Beauty Clinic', margin, 14);
  doc.setFontSize(11);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(185, 160, 120);
  doc.text('Historia Clínica — Consentimiento Informado', margin, 22);
  doc.setTextColor(150, 130, 110);
  doc.text(new Date().toLocaleDateString('es-ES', {day:'2-digit',month:'long',year:'numeric'}), W-margin, 22, {align:'right'});
  y = 40;

  // ── Treatment ──
  doc.setFillColor(248, 244, 239);
  doc.rect(margin, y-5, W-margin*2, 14, 'F');
  addText('TRATAMIENTO:', margin+4, 10, false, [160,120,64]);
  addText(t.name, margin+45, 12, true, [42,35,32]);
  newLine(1.5);
  hLine();
  newLine(0.5);

  // ── Personal data ──
  const addField = (label, value, xOffset=0) => {
    doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(140,110,90);
    doc.text(label.toUpperCase(), margin+xOffset, y);
    doc.setFontSize(11); doc.setFont('helvetica','normal'); doc.setTextColor(42,35,32);
    doc.text(value||'—', margin+xOffset, y+4.5);
  };

  addText('DATOS PERSONALES DEL PACIENTE', margin, 10, true, [160,120,64]);
  newLine(1.2);
  hLine([220,205,185]);
  newLine(0.8);

  addField('Nombre', p.nombre||'', 0);
  addField('Apellidos', p.apellidos||'', 55);
  newLine(2);
  addField('Fecha de Nacimiento', p.nacimiento ? new Date(p.nacimiento+'T00:00').toLocaleDateString('es-ES') : '—', 0);
  addField('Nº Documento', p.documento||'', 55);
  addField('Teléfono', p.telefono||'', 105);
  newLine(2);
  addField('Email', p.email||'—', 0);
  addField('Localidad', p.localidad||'—', 75);
  addField('CP', p.cp||'—', 135);
  newLine(2);
  addField('Dirección', p.direccion||'—', 0);
  newLine(2);
  addField('Tipo de piel', p.tipopiel||'—', 0);
  addField('Fecha sesión', p.fecha ? new Date(p.fecha+'T00:00').toLocaleDateString('es-ES') : '—', 55);
  newLine(2.5);

  // ── Medical questionnaire ──
  checkPage(60);
  hLine();
  addText('CUESTIONARIO MÉDICO', margin, 10, true, [160,120,64]);
  newLine(1.2);
  hLine([220,205,185]);
  newLine(0.5);

  MEDICAL_QUESTIONS.forEach((q, i) => {
    checkPage(8);
    const ans = state.medical[i];
    const ansText = ans === true ? 'SÍ' : ans === false ? 'NO' : 'N/R';
    const color = ans === true ? [160,80,80] : [80,130,100];
    doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(60,50,45);
    doc.text(`${i+1}. ${q}`, margin, y);
    doc.setFontSize(10); doc.setFont('helvetica','bold'); doc.setTextColor(...color);
    doc.text(ansText, W-margin, y, {align:'right'});
    newLine(1);
    if (i < MEDICAL_QUESTIONS.length-1) {
      doc.setDrawColor(235,225,215);
      doc.line(margin, y, W-margin, y);
    }
    newLine(0.2);
  });

  if (p.observaciones) {
    checkPage(20);
    newLine(1);
    addText('OBSERVACIONES / MEDICACIÓN:', margin, 10, true, [160,120,64]);
    newLine(1.2);
    doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(80,65,55);
    const obsLines = doc.splitTextToSize(p.observaciones, W-margin*2);
    doc.text(obsLines, margin, y);
    y += obsLines.length * 5;
  }

  // ── Laser followup ──
  if (t.hasFollowup && state.followup.length > 0) {
    doc.addPage(); y = 20;
    addText('PLANILLA DE SEGUIMIENTO — ' + t.name.toUpperCase(), margin, 11, true, [42,35,32]);
    newLine(1.2);
    hLine();
    newLine(0.5);

    if (state.areasToTreat) {
      addText('Zonas a tratar: ' + state.areasToTreat, margin, 10, false, [120,90,60]);
      newLine(1.5);
    }

    // Table header
    const cols = [18, 52, 90, 115, 140, 175];
    const headers = ['FECHA','TRATAMIENTO/ZONA','POTENCIA','PRECIO','OBSERVACIÓN','FIRMA'];
    doc.setFillColor(42,35,32);
    doc.rect(margin, y-4, W-margin*2, 10, 'F');
    headers.forEach((h, i) => {
      doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(232,213,176);
      doc.text(h, cols[i], y+2);
    });
    newLine(1.5);

    state.followup.forEach((row, ri) => {
      checkPage(10);
      if (ri % 2 === 0) {
        doc.setFillColor(252,248,244);
        doc.rect(margin, y-4, W-margin*2, 9, 'F');
      }
      doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(60,50,45);
      const vals = [
        row.fecha ? new Date(row.fecha+'T00:00').toLocaleDateString('es-ES') : '',
        row.tratamiento||'', row.potencia||'', row.precio||'',
        row.observacion||'', row.firma||''
      ];
      vals.forEach((v, i) => doc.text(v, cols[i], y));
      newLine(1.4);
      doc.setDrawColor(230,220,210);
      doc.line(margin, y, W-margin, y);
      newLine(0.1);
    });
  }

  // ── Consent text ──
  doc.addPage(); y = 20;
  addText('DOCUMENTO DE CONSENTIMIENTO INFORMADO', margin, 12, true, [42,35,32]);
  newLine(1.3);
  hLine();
  newLine(0.5);

  // Strip HTML
  const temp = document.createElement('div');
  temp.innerHTML = CONSENT_TEXTS[t.id];
  const lines = temp.innerText.split('\n').filter(l => l.trim());
  lines.forEach(line => {
    checkPage(10);
    const wrapped = doc.splitTextToSize(line.trim(), W-margin*2);
    const isHeading = line.trim().length < 60 && (line.includes('Consentimiento') || line.includes('RIESGO') || line.includes('CONTRA') || line.includes('PRECAUC') || line.includes('EFECTOS') || line.includes('Declaración') || line.includes('Indicac'));
    doc.setFontSize(isHeading ? 10 : 9.5);
    doc.setFont('helvetica', isHeading ? 'bold' : 'normal');
    doc.setTextColor(isHeading ? 160 : 80, isHeading ? 120 : 65, isHeading ? 64 : 55);
    doc.text(wrapped, margin, y);
    y += wrapped.length * (isHeading ? 5.5 : 5);
    if (isHeading) newLine(0.3);
  });

  // ── Signature ──
  checkPage(50);
  newLine(2);
  hLine();
  newLine(1);
  addText('FIRMA DEL PACIENTE', margin, 10, true, [160,120,64]);
  newLine(1.5);

  if (state.signature) {
    try {
      doc.addImage(state.signature, 'PNG', margin, y, 80, 35);
      y += 38;
    } catch(e) {}
  }

  doc.setDrawColor(160,120,64);
  doc.line(margin, y, margin+80, y);
  newLine(1);
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(140,120,100);
  doc.text(`${p.nombre||''} ${p.apellidos||''}`, margin, y);
  newLine(0.8);
  doc.text('Fecha: ' + (p.fecha ? new Date(p.fecha+'T00:00').toLocaleDateString('es-ES') : new Date().toLocaleDateString('es-ES')), margin, y);

  // ── GDPR note ──
  newLine(2);
  doc.setFillColor(248,244,239);
  doc.rect(margin, y-3, W-margin*2, 18, 'F');
  doc.setFontSize(8); doc.setFont('helvetica','italic'); doc.setTextColor(140,120,100);
  const gdprText = 'El/la paciente ha dado su consentimiento expreso para el tratamiento de sus datos personales conforme al RGPD (UE) 2016/679, con la finalidad exclusiva de gestión de historia clínica por parte de Soho Beauty Clinic.';
  const gdprLines = doc.splitTextToSize(gdprText, W-margin*2-8);
  doc.text(gdprLines, margin+4, y+3);

  return doc.output('datauristring').split(',')[1];
}

// ═══════════════════════════════════════════════════════════════
//  SEND TO GOOGLE APPS SCRIPT
// ═══════════════════════════════════════════════════════════════
async function sendToGoogleDrive(pdfBase64) {
  const apellido = (state.personal.apellidos || 'Desconocido').trim().charAt(0).toUpperCase();
  const fecha = state.personal.fecha || new Date().toISOString().split('T')[0];
  const filename = `${state.personal.apellidos||'Paciente'}_${state.personal.nombre||''}_${state.treatment.id}_${fecha}.pdf`
    .replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_\-\.]/g, '');

  const payload = {
    pdf: pdfBase64,
    filename,
    folder: apellido,
    paciente: `${state.personal.nombre} ${state.personal.apellidos}`,
    tratamiento: state.treatment.name,
    fecha,
  };

  const resp = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(payload),
  });

  if (!resp.ok) throw new Error('Apps Script error: ' + resp.status);
  return resp.json();
}
